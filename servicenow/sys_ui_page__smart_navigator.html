// Navigate top-level window (works inside NE iframe)
function go(url){
  var a=document.createElement('a');

// ============================================================
// Semantic signal vocabulary
// Maps keyword clues to record types
// ============================================================
var SIG={
  inc:['incident','issue','error','crash','slow','memory leak','memory','cpu usage','cpu','performance','outage','degraded','alert','alarm','offline','failing','failed','broken','hung','frozen','not working','unavailable','service down','high cpu','high memory','disk full','disk space','timeout','exception','latency','spike','bottleneck','unresponsive','unreachable'],
  chg:['deploy','deployment','release','patch','upgrade','migration','maintenance','rollback','reboot','restart','emergency change','standard change','normal change','cab','change freeze','planned work','rfcm','change window','change request','scheduled work','downtime'],
  prb:['root cause','workaround','recurring','rca','known error','systemic','post incident','pir','repeat incident','problem management','underlying cause','permanent fix'],
  rel:['relationship','dependency','depends on','depends','impacts','topology','service map','connects to','connected to','linked to','upstream','downstream','runs on','hosted on','cmdb rel','cmdb relationship','mapped to','related to','affected by'],
  ast:['asset','hardware','laptop','workstation','equipment','warranty','procurement','inventory','serial number','model number','purchase order','end of life','asset tag'],
  req:['request','provision','onboard','onboarding','catalog item','service request','fulfillment','order access','new account','new access'],
  acc:['password','reset password','access request','permission','role','account locked','login','locked out','unlock','mfa','vpn access','two factor','credentials','access issue']
};

function matchSigs(ql){
  var m={};
  var keys=Object.keys(SIG);
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki],ws=SIG[k];
    for(var wi=0;wi<ws.length;wi++){
      if(ql.indexOf(ws[wi])>=0){m[k]=true;break;}
    }
  }
  return m;
}

// Extract CI name from relationship queries:
//   "portia relationships"          -> "portia"
//   "relationship on Portia online" -> "Portia online"
function extractRelCI(qt,ql){
  var m=qt.match(/\b(?:on|for|about|of)\s+([\w][\w\s.-]{1,40})$/i);
  if(m){return m[1].replace(/\s*(relationship|relationships|dependency|dependencies|topology|records?)$/i,'').trim();}
  var noise=['relationships','relationship','dependencies','dependency','depends on','depends','topology','service map','linked to','connected to','connects to','upstream','downstream','runs on','hosted on','cmdb rel','impacts','mapped to','related to','affected by','records','record','search','find','show','list'];
  var s=ql;
  noise.forEach(function(w){s=s.replace(new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','g'),' ');});
  s=s.replace(/\s+/g,' ').trim();
  return s.length>=2?s:'';
}

function extractEntity(qt){
  var m=qt.match(/\b(?:on|for|about|of)\s+([\w][\w\s.-]{2,30})$/i);
  return m?m[1].trim():'';
}

// ============================================================
// Intent detection
// ============================================================
function detectIntents(q){
  var qt=q.trim(),ql=qt.toLowerCase(),intents=[];

  // 1. Full record number: INC0001234
  var rm=qt.match(/^([A-Z]{2,8})\s*(\d{4,12})$/i);
  if(rm){var rk=rm[1].toUpperCase(),rn=rk+rm[2],rec=R[rk];
    if(rec){intents.push({id:'__rec',label:'Open '+rec.l+' '+rn,sub:'Direct record jump',url:rec.t+'_list.do?sysparm_query=number='+rn,badge:'Jump',bc:'bj',icon:'&#127919;',live:null});return intents;}}

  // 2. Record prefix + optional partial digits
  var pm=qt.match(/^([A-Z]{2,8})(\d{0,3})$/i);
  if(pm){var pk=pm[1].toUpperCase(),pn=pm[2]||'',rec2=R[pk];
    if(rec2){
      var hasNum=pn.length>0;
      var pUrl=rec2.t+'_list.do'+(hasNum?'?sysparm_query=numberLIKE'+encodeURIComponent(pk+pn):'');
      var pLive=hasNum?{table:rec2.t,q:'numberLIKE'+encodeURIComponent(pk+pn),fields:'number,short_description,sys_id',
        nm:function(r){return r.number;},
        sb:function(r){return r.short_description||'(no description)';},
        ul:function(r){return rec2.t+'.do?sys_id='+r.sys_id;}}:null;
      intents.push({id:'__recpre',
        label:hasNum?'Find '+rec2.l+': '+pk+pn+'...':('Browse all '+rec2.l+'s'),
        sub:hasNum?'Partial number — add more digits to narrow down':'Type digits after '+pk+' to jump to a specific record',
        url:pUrl,badge:rec2.l.split(' ')[0],bc:'bj',icon:'&#127919;',live:pLive});
      return intents;}}

  if(qt.length<2)return intents;

  // 3. Email address
  if(/^[\w.%+-]+@[\w.-]+\.[a-z]{2,}$/i.test(qt)){
    intents.push({id:'__email',label:'Find user: '+qt,sub:'Search by email address',url:'sys_user_list.do?sysparm_query=email='+encodeURIComponent(qt),badge:'User',bc:'bu',icon:'&#128100;',live:{table:'sys_user',q:'email='+encodeURIComponent(qt),fields:'name,email,title,sys_id',nm:function(r){return r.name;},sb:function(r){return (r.email||'')+(r.title?' \u00b7 '+r.title:'');},ul:function(r){return 'sys_user.do?sys_id='+r.sys_id;}}});
    return intents;}

  // 4. IP address
  if(/^\d{1,3}(\.\d{1,3}){3}/.test(qt)){
    intents.push({id:'__ip',label:'Find CI with IP: '+qt,sub:'CMDB search by IP address',url:'cmdb_ci_list.do?sysparm_query=ip_addressLIKE'+encodeURIComponent(qt),badge:'CI',bc:'bc',icon:'&#128187;',live:{table:'cmdb_ci',q:'ip_addressLIKE'+encodeURIComponent(qt),fields:'name,sys_class_name,ip_address,sys_id',nm:function(r){return r.name;},sb:function(r){return (r.ip_address||'')+(r.sys_class_name?' \u00b7 '+r.sys_class_name.replace('cmdb_ci_','').replace(/_/g,' '):'');},ul:function(r){return 'cmdb_ci.do?sys_id='+r.sys_id;}}});
    return intents;}

  // 5. Question words -> knowledge base
  var isQ=/^(how|what|why|when|can|is|are|does|do|where|which|who)\b/i.test(ql);
  if(isQ){
    intents.push({id:'__kb',label:'Search knowledge: "'+qt+'"',sub:'Knowledge base article search',url:'kb_knowledge_list.do?sysparm_query=textLIKE'+encodeURIComponent(qt)+'^workflow_state=published',badge:'KB',bc:'bk',icon:'&#128218;',live:{table:'kb_knowledge',q:'short_descriptionLIKE'+encodeURIComponent(qt)+'^workflow_state=published',fields:'short_description,number,sys_id',nm:function(r){return r.short_description||r.number;},sb:function(r){return r.number||'';},ul:function(r){return 'kb_knowledge.do?sys_id='+r.sys_id;}}});
  }

  // 6. Semantic signal matching
  var sigs=matchSigs(ql);
  var entity=extractEntity(qt);
  var hasSigs=Object.keys(sigs).length>0;

  if(sigs.inc){intents.push({id:'__inc',label:'Search Incidents: "'+qt+'"',sub:'Signal: issue / error / performance / outage',url:'incident_list.do?sysparm_query=short_descriptionLIKE'+encodeURIComponent(qt)+'^ORdescriptionLIKE'+encodeURIComponent(qt)+'^active=true',badge:'INC',bc:'bj',icon:'&#128680;',live:{table:'incident',q:'short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',fields:'number,short_description,priority,sys_id',nm:function(r){return r.number+' \u2014 '+(r.short_description||'').substring(0,55);},sb:function(r){var p=['Critical','High','Moderate','Low','Planning'];return 'Priority: '+(p[(parseInt(r.priority)||5)-1]||r.priority||'?');},ul:function(r){return 'incident.do?sys_id='+r.sys_id;}}});}

  if(sigs.chg){intents.push({id:'__chg',label:'Search Changes: "'+qt+'"',sub:'Signal: deploy / maintenance / patch / change',url:'change_request_list.do?sysparm_query=short_descriptionLIKE'+encodeURIComponent(qt)+'^ORdescriptionLIKE'+encodeURIComponent(qt)+'^active=true',badge:'CHG',bc:'bc',icon:'&#128260;',live:{table:'change_request',q:'short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',fields:'number,short_description,type,sys_id',nm:function(r){return r.number+' \u2014 '+(r.short_description||'').substring(0,55);},sb:function(r){return 'Type: '+(r.type||'?');},ul:function(r){return 'change_request.do?sys_id='+r.sys_id;}}});}

  if(sigs.prb){intents.push({id:'__prb',label:'Search Problems: "'+qt+'"',sub:'Signal: root cause / workaround / recurring',url:'problem_list.do?sysparm_query=short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',badge:'PRB',bc:'bc',icon:'&#9888;',live:{table:'problem',q:'short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',fields:'number,short_description,state,sys_id',nm:function(r){return r.number+' \u2014 '+(r.short_description||'').substring(0,55);},sb:function(r){return 'State: '+(r.state||'?');},ul:function(r){return 'problem.do?sys_id='+r.sys_id;}}});}

  if(sigs.rel){
    var relEntity=extractRelCI(qt,ql)||entity||'';
    // Use parent/child display values — request parent,type,child and read via display_value
    var relQ=relEntity?'parent.nameLIKE'+encodeURIComponent(relEntity)+'^ORchild.nameLIKE'+encodeURIComponent(relEntity):'typeISNOTEMPTY';
    var relUrl='cmdb_rel_ci_list.do'+(relEntity?'?sysparm_query='+relQ:'');
    intents.push({id:'__rel',label:relEntity?'CMDB Relationships for "'+relEntity+'"':'Browse CMDB Relationships',sub:relEntity?'Topology / dependency \u2014 CI: '+relEntity:'Signal: relationship / dependency / topology',url:relUrl,badge:'Rel',bc:'bk',icon:'&#128279;',live:{table:'cmdb_rel_ci',q:relQ,fields:'parent.name,type.name,child.name,sys_id',nm:function(r){return (r['parent.name']||'?')+' \u2192 '+(r['type.name']||'?')+' \u2192 '+(r['child.name']||'?');},sb:function(){return 'CMDB Relationship';},ul:function(r){return 'cmdb_rel_ci.do?sys_id='+r.sys_id;}}});}

  if(sigs.ast){intents.push({id:'__ast',label:'Search Assets: "'+qt+'"',sub:'Signal: hardware / equipment / asset',url:'alm_asset_list.do?sysparm_query=display_nameLIKE'+encodeURIComponent(qt),badge:'Asset',bc:'bc',icon:'&#128230;',live:{table:'alm_asset',q:'display_nameLIKE'+encodeURIComponent(qt),fields:'display_name,asset_tag,state,sys_id',nm:function(r){return r.display_name||(r.asset_tag||'(no name)');},sb:function(r){return 'Tag: '+(r.asset_tag||'?')+' | State: '+(r.state||'?');},ul:function(r){return 'alm_asset.do?sys_id='+r.sys_id;}}});}

  if(sigs.req||sigs.acc){
    var reqLabel=sigs.acc?'Search Access/Requests: "'+qt+'"':'Search Service Requests: "'+qt+'"';
    var reqSub=sigs.acc?'Signal: access / password / permission':'Signal: request / provision / onboard';
    intents.push({id:'__req',label:reqLabel,sub:reqSub,url:'sc_req_item_list.do?sysparm_query=short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',badge:'RITM',bc:'bu',icon:'&#128203;',live:{table:'sc_req_item',q:'short_descriptionLIKE'+encodeURIComponent(qt)+'^active=true',fields:'number,short_description,state,sys_id',nm:function(r){return r.number+' \u2014 '+(r.short_description||'').substring(0,55);},sb:function(r){return 'State: '+(r.state||'?');},ul:function(r){return 'sc_req_item.do?sys_id='+r.sys_id;}}});}

  // No semantic signals -> CI + user defaults
  if(!hasSigs){
    intents.push({id:'__ci',label:'Search CIs: "'+qt+'"',sub:'CMDB configuration item name search',url:'cmdb_ci_list.do?sysparm_query=nameLIKE'+encodeURIComponent(qt),badge:'CI',bc:'bc',icon:'&#128187;',live:{table:'cmdb_ci',q:'nameLIKE'+encodeURIComponent(qt),fields:'name,sys_class_name,ip_address,sys_id',nm:function(r){return r.name;},sb:function(r){var t=r.sys_class_name?r.sys_class_name.replace('cmdb_ci_','').replace(/_/g,' '):'CI';return t+(r.ip_address?' \u00b7 '+r.ip_address:'');},ul:function(r){return 'cmdb_ci.do?sys_id='+r.sys_id;}}});
    var isNm=/^[a-zA-Z][a-zA-Z'-]+(\s+[a-zA-Z][a-zA-Z'-]+){1,2}$/.test(qt)&&!isQ;
    intents.push({id:'__user',label:'Search users: "'+qt+'"',sub:isNm?'Name detected \u2014 searching active users':'Active user search',url:'sys_user_list.do?sysparm_query=nameLIKE'+encodeURIComponent(qt)+'^active=true',badge:'User',bc:'bu',icon:'&#128100;',live:{table:'sys_user',q:'nameLIKE'+encodeURIComponent(qt)+'^active=true',fields:'name,email,title,department,sys_id',nm:function(r){return r.name;},sb:function(r){var p=[];if(r.title)p.push(r.title);if(r.department)p.push(r.department);if(r.email)p.push(r.email);return p.join(' \u00b7 ');},ul:function(r){return 'sys_user.do?sys_id='+r.sys_id;}}});
  } else if(entity){
    intents.push({id:'__ci_ent',label:'Search CIs: "'+entity+'"',sub:'CI extracted from query context',url:'cmdb_ci_list.do?sysparm_query=nameLIKE'+encodeURIComponent(entity),badge:'CI',bc:'bc',icon:'&#128187;',live:{table:'cmdb_ci',q:'nameLIKE'+encodeURIComponent(entity),fields:'name,sys_class_name,ip_address,sys_id',nm:function(r){return r.name;},sb:function(r){var t=r.sys_class_name?r.sys_class_name.replace('cmdb_ci_','').replace(/_/g,' '):'CI';return t+(r.ip_address?' \u00b7 '+r.ip_address:'');},ul:function(r){return 'cmdb_ci.do?sys_id='+r.sys_id;}}});
  }

  // Search everywhere — opens dedicated results page
  intents.push({id:'__global',label:'Search everywhere: "'+qt+'"',sub:'Results across incidents, changes, CIs, knowledge &amp; more',url:'smart_navigator_results.do?q='+encodeURIComponent(qt),badge:'All',bc:'bm',icon:'&#127757;',live:null});

  return intents;
}

// Fuzzy module scoring (m[5]=keywords, m[6]=base_rank)
function sc(m,q){
  var n=m[1].toLowerCase(),k=(m[5]||'').toLowerCase(),ql=q.toLowerCase();
  if(n===ql)return 10000+gu(m[0]);
  if(n.startsWith(ql))return 8500+gu(m[0]);
  if(n.split(' ').some(function(w){return w.startsWith(ql);}))return 6500+gu(m[0]);
  if(n.includes(ql))return 4500+gu(m[0]);
  if(k.includes(ql))return 3500+gu(m[0]);
  if(m[2].toLowerCase().includes(ql))return 2000+gu(m[0]);
  var ci=0;for(var i=0;i<ql.length;i++){var p=n.indexOf(ql[i],ci);if(p===-1)return -1;ci=p+1;}
  return 500+gu(m[0]);
}

var lr=[],si=-1,liveTimer=null,curQ='';

window.goI=function(idx){if(lr[idx]){tu(lr[idx][0]);go(lr[idx][1]);}};
window.goChip=function(id){var m=M.find(function(x){return x[0]===id;});if(m){tu(id);go(m[3]);}};
window.toggleBrowse=function(){
  var d=document.getElementById('browseDiv');
  var open=d.style.display==='none'||!d.style.display;
  d.style.display=open?'block':'none';
  document.getElementById('bb').textContent=open?'\u25b4 Collapse':'\u25be Browse all modules';
  if(open&&!d.innerHTML){
    var cats={};M.forEach(function(m){if(!cats[m[2]])cats[m[2]]=[];cats[m[2]].push(m);});
    var h='';Object.keys(cats).forEach(function(cat){
      h+='<div class="bcat">'+cat+'</div>';
      cats[cat].forEach(function(m){h+='<div class="bitem" onclick="goChip(\''+m[0]+'\')" ><span style="color:'+(CC[cat]||'#607d8b')+'">&#9632;</span> '+m[1]+'</div>';});
    });
    d.innerHTML=h;
  }
};

function renderChips(){
  var sorted=M.slice().sort(function(a,b){return(gu(b[0])+b[6])-(gu(a[0])+a[6]);}).slice(0,8);
  document.getElementById('chips').innerHTML=sorted.map(function(m){
    return '<span class="chip" onclick="goChip(\''+m[0]+'\')" >'+m[1]+'</span>';
  }).join('');
}

function renderAll(q,intents,mods){
  lr=[];var h='',idx=0;
  if(intents.length){
    h+='<div class="sec">&#129504; Smart Search</div>';
    intents.forEach(function(it){
      lr.push([it.id,it.url]);
      h+='<div class="ri" onclick="goI('+idx+')">';
      h+='<div class="ri-ico">'+it.icon+'</div>';
      h+='<div class="ri-body"><div class="ri-name">'+it.label+'</div><div class="ri-sub">'+it.sub+'</div></div>';
      h+='<div class="ri-badge '+it.bc+'">'+it.badge+'</div></div>';
      idx++;
    });
  }
  if(mods.length){
    h+='<div class="sec">Modules</div>';
    mods.forEach(function(m){
      lr.push([m[0],m[3]]);
      var c=CC[m[2]]||'#607d8b';
      var em=m[4]==='form'?'&#128221;':(m[2]==='CMDB / Asset'?'&#128187;':(m[2]==='Knowledge'?'&#128218;':(m[2]==='Reporting'?'&#128202;':'&#128203;')));
      h+='<div class="ri" onclick="goI('+idx+')">';
      h+='<div class="ri-ico" style="background:'+c+'18;color:'+c+'">'+em+'</div>';
      h+='<div class="ri-body"><div class="ri-name">'+m[1]+'</div><div class="ri-sub">'+m[2]+'</div></div>';
      h+='<div class="ri-badge bm">'+(m[4]==='form'?'Form':'List')+'</div></div>';
      idx++;
    });
  }
  if(!h)h='<div class="empty">No results &mdash; try a different keyword or type INC/CHG/PRB + number.</div>';

  // Live result placeholders — only for intents with live config
  var livePH='';
  intents.forEach(function(it){
    if(!it.live)return;
    var lid='lv_'+it.id.replace(/__/g,'').replace(/_/g,'');
    livePH+='<div id="'+lid+'"><div class="ld"><div class="sp"></div>Searching '+it.badge+' records...</div></div>';
  });
  if(livePH)h+='<div class="sec">&#128269; Live Results</div>'+livePH;
  document.getElementById('results').innerHTML=h;
  si=-1;
}

function fetchLive(q,it){
  if(!it.live)return;
  var lid='lv_'+it.id.replace(/__/g,'').replace(/_/g,'');
  var url='/api/now/table/'+it.live.table
    +'?sysparm_query='+it.live.q
    +'&sysparm_limit=5'
    +'&sysparm_fields='+it.live.fields
    +'&sysparm_display_value=true'
    +'&sysparm_exclude_reference_link=true';
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.setRequestHeader('Accept','application/json');
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4||q!==curQ)return;
    var el=document.getElementById(lid);
    if(!el)return;
    if(xhr.status===200){
      var data;try{data=JSON.parse(xhr.responseText);}catch(e){el.innerHTML='';return;}
      var recs=(data&&data.result)||[];
      if(!recs.length){el.innerHTML='<div class="ld" style="color:#b0bec5">No '+it.badge+' records found</div>';return;}
      var h='',bc=it.bc;
      var borderMap={bj:'#2e7d32',bu:'#1565c0',bc:'#e65100',bk:'#6a1b9a',bm:'#3c6bc9'};
      var border=borderMap[bc]||'#607d8b';
      recs.forEach(function(r){
        var rIdx=lr.length;
        lr.push(['__lv'+rIdx,it.live.ul(r)]);
        h+='<div class="ri" onclick="goI('+rIdx+')" style="border-left:3px solid '+border+'">';
        h+='<div class="ri-ico">'+it.icon+'</div>';
        h+='<div class="ri-body"><div class="ri-name">'+it.live.nm(r)+'</div><div class="ri-sub">'+it.live.sb(r)+'</div></div>';
        h+='<div class="ri-badge '+bc+'">'+it.badge+'</div></div>';
      });
      el.innerHTML=h;
    }else{
      el.innerHTML='<div class="ld" style="color:#b0bec5">Could not load live results ('+xhr.status+')</div>';
    }
  };
  xhr.send();
}

document.getElementById('q').addEventListener('input',function(){
  var q=this.value.trim();
  curQ=q;
  if(liveTimer){clearTimeout(liveTimer);liveTimer=null;}
  if(!q){renderChips();document.getElementById('results').innerHTML='';lr=[];si=-1;return;}
  document.getElementById('chips').innerHTML='';
  var intents=detectIntents(q);
  var scored=M.map(function(m){return{m:m,s:sc(m,q)};}).filter(function(x){return x.s>0;}).sort(function(a,b){return b.s-a.s;}).slice(0,10).map(function(x){return x.m;});
  renderAll(q,intents,scored);
  liveTimer=setTimeout(function(){
    if(q!==curQ)return;
    intents.forEach(function(it){
      if(it.live)fetchLive(q,it);
    });
  },400);
});

document.getElementById('q').addEventListener('keydown',function(e){
  var items=document.querySelectorAll('.ri');
  if(e.key==='ArrowDown'){e.preventDefault();si=Math.min(si+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();si=Math.max(si-1,0);}
  else if(e.key==='Enter'){
    e.preventDefault();
    if(si>=0&&lr[si]){tu(lr[si][0]);go(lr[si][1]);}
    else if(lr.length){tu(lr[0][0]);go(lr[0][1]);}
    return;
  }
  else return;
  items.forEach(function(el,i){el.classList.toggle('sel',i===si);});
  if(items[si])items[si].scrollIntoView({block:'nearest'});
});

renderChips();
document.getElementById('q').focus();
})();
</script>
